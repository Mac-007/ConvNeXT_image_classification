# Configuration file for ConvNeXT Image Classification Project
# All parameters are loaded from this file - no hardcoded values in code

paths:
  train_csv: "/home/gssc/Qaiser/Post_PhD/Code/IEEE_DELCON_2026/Full_training_csv/train.csv"
  val_csv: "/home/gssc/Qaiser/Post_PhD/Code/IEEE_DELCON_2026/Full_training_csv/val.csv"
  test_csv: "/home/gssc/Qaiser/Post_PhD/Code/IEEE_DELCON_2026/Full_training_csv/test.csv"

# Dataset configuration
dataset:
  batch_size: 32
  num_workers: 4
  image_size: 224
  random_seed: 42

# Model configuration
model:
  convnext_variant: "convnext_base"  # Options: convnext_tiny, convnext_small, convnext_base, convnext_large
  num_classes: 7
  pretrained: true
  class_names:
    - "bike"
    - "cars"
    - "cats"
    - "dogs"
    - "flowers"
    - "horses"
    - "human"

# Training configuration
training:
  epochs: 50
  learning_rate: 0.0003
  optimizer: "adamw"  # Options: adam, sgd, adamw
  weight_decay: 0.001
  scheduler: "cosine"  # Options: cosine, step, plateau, none
  scheduler_params:
    T_max: 50
    eta_min: 0.00001
  device: "cuda"  # Options: cuda, cpu, auto
  mixed_precision: true
  gradient_clipping: 1.0

# Early stopping configuration
early_stopping:
  enabled: False
  patience: 10
  monitor_metric: "val_loss"  # Options: val_loss, val_accuracy
  mode: "min"  # Options: min, max

# Checkpoint configuration
checkpoint:
  save_best_only: false
  checkpoint_frequency: 5  # Save checkpoint every N epochs

# Logging configuration
logging:
  logging_frequency: 10  # Log every N batches
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR

# Image normalization (ImageNet statistics)
normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# Output directories
# Base directory for outputs (timestamp-based subfolders will be created automatically)
output_base_dir: "outputs"
output_directories:
  logs: "outputs/logs"
  checkpoints: "outputs/checkpoints"
  metrics: "outputs/metrics"
  predictions: "outputs/predictions"
